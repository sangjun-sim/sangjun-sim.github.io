intro:
  title: About
  body: >-
    I write technical notes while learning condensed matter physics,
    many-body theory, magnetism, symmetry, topology, and programming tools.
    I am enthusiastic about numerical approaches to understand intriguing phenomena in solids.
    This blog is a place to keep ideas precise enough to revisit.
    I also hope that these notes can be helpful to others who are learning similar topics.
